services:
  postgres:
    image: postgres:18.1
    container_name: pytholit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pytholit
    ports:
      - '5432:5432'
    volumes:
      - pytholit_postgres_dev:/var/lib/postgresql

volumes:
  pytholit_postgres_dev:
