services:
  postgres:
    image: postgres:16-alpine
    container_name: pytholit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pytholit
    ports:
      - '5432:5432'
    volumes:
      - pytholit_postgres_dev:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: pytholit-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'

  env-orchestrator:
    build:
      context: .
      dockerfile: docker/env-orchestrator.Dockerfile
    container_name: pytholit-env-orchestrator-dev
    restart: unless-stopped
    environment:
      PORT: '3401'
    ports:
      - '3401:3401'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3401/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pytholit-api-dev
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - env-orchestrator
    environment:
      APP_ENV: localhost
      NODE_ENV: development
      PORT: '3001'
      FRONTEND_URL: http://localhost:3000
      COOKIE_DOMAIN: ''
      UPLOAD_DIR: uploads
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: pytholit
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret
      ENV_SESSION_SECRET: dev-env-session-secret
      ENV_SESSION_TTL_SECONDS: '120'
    ports:
      - '3001:3001'

volumes:
  pytholit_postgres_dev:
