services:
  postgres:
    image: postgres:16-alpine
    container_name: pytholit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pytholit
    ports:
      - '5432:5432'
    volumes:
      - pytholit_postgres_dev:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: pytholit-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'

  lago-db:
    image: getlago/postgres-partman:15.0-alpine
    container_name: pytholit-lago-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: lago
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: lago_dev_password
    ports:
      - '5433:5432'
    volumes:
      - lago_postgres_dev:/var/lib/postgresql/data

  lago-redis:
    image: redis:7-alpine
    container_name: pytholit-lago-redis-dev
    restart: unless-stopped
    ports:
      - '6380:6379'

  lago-api:
    image: getlago/api:v1.42.0
    container_name: pytholit-lago-api-dev
    restart: unless-stopped
    command: ["./scripts/start.api.sh"]
    depends_on:
      - lago-db
      - lago-redis
      - lago-migrate
    environment:
      DATABASE_URL: postgresql://lago:lago_dev_password@lago-db:5432/lago
      REDIS_URL: redis://lago-redis:6379
      LAGO_API_URL: http://lago-api:3000
      LAGO_FRONT_URL: http://localhost:8080
      SECRET_KEY_BASE: dev-secret-key-base-change-before-production
      RAILS_ENV: production
      LAGO_DISABLE_SEGMENT: "true"
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      LAGO_ENCRYPTION_PRIMARY_KEY: dev-encryption-primary-key
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: dev-encryption-deterministic-key
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: dev-encryption-derivation-salt
      LAGO_CREATE_ORG: "true"
      LAGO_ORG_NAME: Pytholit Dev
      LAGO_ORG_USER_EMAIL: dev@pytholit.local
      LAGO_ORG_USER_PASSWORD: DevPassword123!
      LAGO_ORG_API_KEY: lago-dev-api-key
    ports:
      - '3010:3000'

  lago-worker:
    image: getlago/api:v1.42.0
    container_name: pytholit-lago-worker-dev
    restart: unless-stopped
    command: ["./scripts/start.worker.sh"]
    depends_on:
      - lago-db
      - lago-redis
      - lago-migrate
    environment:
      DATABASE_URL: postgresql://lago:lago_dev_password@lago-db:5432/lago
      REDIS_URL: redis://lago-redis:6379
      SECRET_KEY_BASE: dev-secret-key-base-change-before-production
      RAILS_ENV: production
      LAGO_DISABLE_SEGMENT: "true"
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      LAGO_ENCRYPTION_PRIMARY_KEY: dev-encryption-primary-key
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: dev-encryption-deterministic-key
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: dev-encryption-derivation-salt

  lago-migrate:
    image: getlago/api:v1.42.0
    container_name: pytholit-lago-migrate-dev
    restart: "no"
    depends_on:
      - lago-db
      - lago-redis
    command: ["./scripts/migrate.sh"]
    environment:
      DATABASE_URL: postgresql://lago:lago_dev_password@lago-db:5432/lago
      REDIS_URL: redis://lago-redis:6379
      SECRET_KEY_BASE: dev-secret-key-base-change-before-production
      RAILS_ENV: production
      LAGO_DISABLE_SEGMENT: "true"
      LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
      LAGO_ENCRYPTION_PRIMARY_KEY: dev-encryption-primary-key
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: dev-encryption-deterministic-key
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: dev-encryption-derivation-salt

  lago-front:
    image: getlago/front:v1.42.0
    container_name: pytholit-lago-front-dev
    restart: unless-stopped
    depends_on:
      - lago-api
    environment:
      API_URL: http://lago-api:3000
    ports:
      - '8080:80'

  # Optional: Orb Sync Engine (Supabase) — syncs Orb → Postgres schema `orb` to reduce Orb API reads.
  # Repo: https://github.com/supabase/orb-sync-engine
  # Webhooks endpoint: POST /webhooks
  orb-sync-migrate:
    image: postgres:16-alpine
    container_name: pytholit-orb-sync-migrate-dev
    restart: "no"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pytholit?sslmode=disable
    command:
      [
        "sh",
        "-lc",
        "apk add --no-cache curl >/dev/null && \
         if psql \"$DATABASE_URL\" -tAc \"select 1 from information_schema.schemata where schema_name='orb'\" | grep -q 1; then \
           echo \"orb schema already exists; skipping orb-sync-engine migrations\"; exit 0; \
         fi; \
         for f in 0001_initial.sql 0002_discounts_nullable.sql 0003_updated_at.sql 0004_plans.sql 0005_subscription_adjustment_intervals.sql 0006_subscription_exceeded_events.sql 0007_billable_metrics.sql 0008_credit_notes_invoice_id_idx.sql 0009_add_last_synced_at_columns.sql 0010_customer_props.sql; do \
           echo \"Applying orb-sync-engine migration $f\"; \
           curl -fsSL \"https://raw.githubusercontent.com/supabase/orb-sync-engine/main/db/migrations/$f\" | psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1; \
         done"
      ]

  orb-sync-engine:
    image: supabase/orb-sync-engine:latest
    container_name: pytholit-orb-sync-engine-dev
    restart: unless-stopped
    depends_on:
      - postgres
      - orb-sync-migrate
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pytholit?sslmode=disable
      DATABASE_SCHEMA: orb
      ORB_API_KEY: ${ORB_API_KEY:-}
      ORB_WEBHOOK_SECRET: ${ORB_WEBHOOK_SECRET:-dev-orb-webhook-secret}
      VERIFY_WEBHOOK_SIGNATURE: "true"
      PROMETHEUS_METRICS_ENABLED: "true"
    ports:
      - '3020:8080'

  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pytholit-api-dev
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: localhost
      NODE_ENV: development
      PORT: '3001'
      FRONTEND_URL: http://localhost:3000
      COOKIE_DOMAIN: ''
      UPLOAD_DIR: uploads
      REDIS_URL: redis://redis:6379
      # env-orchestrator runs on the host in local dev (pnpm dev)
      ORCHESTRATOR_URL: http://host.docker.internal:3003
      INTERNAL_SECRET: dev-internal-secret
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: pytholit
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      JWT_SECRET: dev-secret
      ENV_SESSION_SECRET: dev-env-session-secret
      ENV_SESSION_TTL_SECONDS: '120'
      LAGO_API_URL: http://lago-api:3000
      LAGO_API_KEY: lago-dev-api-key
      LAGO_WEBHOOK_SECRET: lago-dev-webhook-secret
      LAGO_ORGANIZATION_ID: 11111111-2222-3333-4444-555555555555
      LAGO_ROLLOUT_PERCENT: '100'
    ports:
      - '3001:3001'

volumes:
  pytholit_postgres_dev:
  lago_postgres_dev:
