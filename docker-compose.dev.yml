services:
  postgres:
    image: postgres:17-alpine
    container_name: pytholit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pytholit
    ports:
      - '5432:5432'
    volumes:
      - pytholit_postgres_dev:/var/lib/postgresql

  redis:
    image: redis:7.4-alpine
    container_name: pytholit-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: pytholit-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: pytholit-minio-init-dev
    depends_on:
      - minio
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
        sleep 3 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pytholit-dev &&
        mc anonymous set download local/pytholit-dev
      "

  api:
    profiles: ['api']
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pytholit-api-dev
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      NODE_ENV: development
      PORT: '3001'
      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:3001
      COOKIE_DOMAIN: ''

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/v1/auth/callback/google}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:3001/api/v1/auth/callback/github}

      UPLOAD_DIR: uploads
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: pytholit-dev
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_URL: http://localhost:9000/pytholit-dev
      S3_FORCE_PATH_STYLE: 'true'

      REDIS_URL: redis://redis:6379
      INTERNAL_SECRET: dev-internal-secret

      DB_HOST: postgres
      DB_DIRECT_HOST: postgres
      DB_PORT: '5432'
      DB_DIRECT_PORT: '5432'
      DB_NAME: pytholit
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

      JWT_SECRET: dev-secret
      ENV_SESSION_SECRET: dev-env-session-secret
      ENV_SESSION_TTL_SECONDS: '120'
    ports:
      - '3001:3001'

volumes:
  pytholit_postgres_dev:
  minio_data:
