name: Validate Plans

on:
  pull_request:
    paths:
      - "packages/config/src/plans/**"
      - "scripts/validate-plans.mjs"
  push:
    branches:
      - main
      - master
    paths:
      - "packages/config/src/plans/**"
      - "scripts/validate-plans.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate plan JSON
        run: node scripts/validate-plans.mjs
