name: Deploy Dev/Prod Platform

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Optional image tag override (default: git short SHA)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: demo-deploy-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || (github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'release/') && 'prod') || (startsWith(github.ref, 'refs/heads/release/') && 'prod' || 'dev') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve deploy context
        id: context
        env:
          DEPLOY_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TARGET_ENV: ${{ inputs.target_env }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          AWS_ROLE_DEV: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          AWS_ROLE_PROD: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
        run: |
          if [[ "$DEPLOY_EVENT_NAME" == "workflow_dispatch" ]]; then
            deploy_env="$INPUT_TARGET_ENV"
          elif [[ "$DEPLOY_EVENT_NAME" == "workflow_run" && "$WORKFLOW_RUN_HEAD_BRANCH" == release/* ]]; then
            deploy_env="prod"
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            deploy_env="prod"
          else
            deploy_env="dev"
          fi

          if [[ "$deploy_env" == "prod" ]]; then
            aws_role="$AWS_ROLE_PROD"
          else
            aws_role="$AWS_ROLE_DEV"
          fi

          if [[ -n "${INPUT_IMAGE_TAG}" ]]; then
            image_tag="$INPUT_IMAGE_TAG"
          else
            image_tag="${GITHUB_SHA::12}"
          fi

          {
            echo "deploy_env=$deploy_env"
            echo "aws_role=$aws_role"
            echo "image_tag=$image_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Validate AWS role secret
        run: |
          if [[ -z "${{ steps.context.outputs.aws_role }}" ]]; then
            echo "Missing AWS role secret for selected environment."
            echo "Set AWS_ROLE_TO_ASSUME_DEV for dev and AWS_ROLE_TO_ASSUME_PROD for prod."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.context.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve deployment metadata
        id: meta
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          {
            echo "deploy_env=${{ steps.context.outputs.deploy_env }}"
            echo "registry=$registry"
            echo "image_tag=${{ steps.context.outputs.image_tag }}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push images
        run: |
          set -euo pipefail
          registry="${{ steps.meta.outputs.registry }}"
          tag="${{ steps.meta.outputs.image_tag }}"

          IMAGE_TAG="$tag" ECR_REGISTRY="$registry" AWS_REGION="$AWS_REGION" ./scripts/build-and-push-demo-images.sh

      - name: Deploy to ECS (register new task defs + update services)
        run: |
          set -euo pipefail
          registry="${{ steps.meta.outputs.registry }}"
          tag="${{ steps.meta.outputs.image_tag }}"

          # NOTE: For now dev and prod share the same demo cluster name.
          cluster_name="demo-services-cluster"

          ./scripts/ecs-deploy-service-image.sh "$cluster_name" demo-web web "${registry}/web:${tag}"
          ./scripts/ecs-deploy-service-image.sh "$cluster_name" demo-api api "${registry}/api:${tag}"
          ./scripts/ecs-deploy-service-image.sh "$cluster_name" demo-ingress-router ingress-router "${registry}/ingress-router:${tag}"
          ./scripts/ecs-deploy-service-image.sh "$cluster_name" demo-terminal-gateway terminal-gateway "${registry}/terminal-gateway:${tag}"
          ./scripts/ecs-deploy-service-image.sh "$cluster_name" demo-orchestrator orchestrator "${registry}/env-orchestrator:${tag}"

      - name: Deploy summary
        run: |
          echo "Environment: ${{ steps.meta.outputs.deploy_env }}"
          echo "Deployed image tag: ${{ steps.meta.outputs.image_tag }}"
          echo "ECR registry: ${{ steps.meta.outputs.registry }}"
