name: Deploy Demo

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - "infra/demo/**"
      - "scripts/build-and-push-demo-images.sh"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: "Optional image tag override (default: git short SHA)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: demo-deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || (startsWith(github.ref, 'refs/heads/release/') && 'prod' || 'dev') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy context
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            deploy_env="${{ inputs.target_env }}"
          elif [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            deploy_env="prod"
          else
            deploy_env="dev"
          fi

          if [[ "$deploy_env" == "prod" ]]; then
            aws_role="${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}"
          else
            aws_role="${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}"
          fi

          if [[ -n "${{ inputs.image_tag }}" ]]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="${GITHUB_SHA::12}"
          fi

          echo "deploy_env=$deploy_env" >> "$GITHUB_OUTPUT"
          echo "aws_role=$aws_role" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Validate AWS role secret
        run: |
          if [[ -z "${{ steps.context.outputs.aws_role }}" ]]; then
            echo "Missing AWS role secret for selected environment."
            echo "Set AWS_ROLE_TO_ASSUME_DEV for dev and AWS_ROLE_TO_ASSUME_PROD for prod."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.context.outputs.aws_role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve deployment metadata
        id: meta
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "deploy_env=${{ steps.context.outputs.deploy_env }}" >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ steps.context.outputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          repos=(web api ingress-router env-orchestrator terminal-gateway)
          for repo in "${repos[@]}"; do
            if ! aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1; then
              aws ecr create-repository \
                --repository-name "$repo" \
                --image-tag-mutability IMMUTABLE \
                --image-scanning-configuration scanOnPush=true >/dev/null
            fi
          done

      - name: Build and push images
        run: |
          set -euo pipefail
          registry="${{ steps.meta.outputs.registry }}"
          tag="${{ steps.meta.outputs.image_tag }}"

          declare -a services=(
            "web:docker/web.Dockerfile"
            "api:docker/api.Dockerfile"
            "ingress-router:docker/ingress-router.Dockerfile"
            "env-orchestrator:docker/env-orchestrator.Dockerfile"
            "terminal-gateway:docker/terminal-gateway.Dockerfile"
          )

          for item in "${services[@]}"; do
            name="${item%%:*}"
            dockerfile="${item##*:}"
            image="${registry}/${name}:${tag}"
            echo "Building ${image}"
            docker build -f "${dockerfile}" -t "${image}" .
            docker push "${image}"
          done

      - name: Write Terraform image overrides
        run: |
          cat > infra/demo/ci-images.auto.tfvars.json <<EOF
          {
            "images": {
              "web": "${{ steps.meta.outputs.registry }}/web:${{ steps.meta.outputs.image_tag }}",
              "api": "${{ steps.meta.outputs.registry }}/api:${{ steps.meta.outputs.image_tag }}",
              "terminal_gateway": "${{ steps.meta.outputs.registry }}/terminal-gateway:${{ steps.meta.outputs.image_tag }}",
              "ingress_router": "${{ steps.meta.outputs.registry }}/ingress-router:${{ steps.meta.outputs.image_tag }}",
              "orchestrator": "${{ steps.meta.outputs.registry }}/env-orchestrator:${{ steps.meta.outputs.image_tag }}"
            }
          }
          EOF

      - name: Reclaim disk before Terraform
        run: |
          set -euo pipefail
          docker system df || true
          docker builder prune -af || true
          docker system prune -af --volumes || true
          df -h

      - name: Terraform init
        working-directory: infra/demo
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra/demo
        run: |
          args=(-input=false -auto-approve -var-file=ci-images.auto.tfvars.json)
          tfvars_file="${{ steps.meta.outputs.deploy_env }}.tfvars"
          if [[ -f "$tfvars_file" ]]; then
            echo "Using environment tfvars: $tfvars_file"
            args+=(-var-file="$tfvars_file")
          else
            echo "No environment tfvars file found at infra/demo/$tfvars_file, using defaults."
          fi
          terraform apply "${args[@]}"

      - name: Run Prisma migrations (one-off ECS task)
        run: |
          set -euo pipefail

          cluster_name="demo-services-cluster"
          service_name="demo-api"
          task_def="$(aws ecs describe-services \
            --cluster "$cluster_name" \
            --services "$service_name" \
            --query 'services[0].taskDefinition' \
            --output text)"

          subnet_csv="$(aws ecs describe-services \
            --cluster "$cluster_name" \
            --services "$service_name" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output text | tr '\t' ',')"
          sg_csv="$(aws ecs describe-services \
            --cluster "$cluster_name" \
            --services "$service_name" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output text | tr '\t' ',')"

          if [[ -z "$task_def" || "$task_def" == "None" ]]; then
            echo "Could not resolve API task definition."
            exit 1
          fi

          if [[ -z "$subnet_csv" || "$subnet_csv" == "None" ]]; then
            echo "Could not resolve API subnets."
            exit 1
          fi

          if [[ -z "$sg_csv" || "$sg_csv" == "None" ]]; then
            echo "Could not resolve API security groups."
            exit 1
          fi

          migration_cmd='const { execSync } = require("node:child_process"); const enc = encodeURIComponent; const required = ["DB_HOST","DB_PORT","DB_NAME","DB_USER","DB_PASSWORD"]; const missing = required.filter((k) => !process.env[k]); if (missing.length) { console.error("Missing DB env vars:", missing.join(", ")); process.exit(1); } const sslmode = process.env.DB_SSLMODE || "require"; const databaseUrl = `postgresql://${enc(process.env.DB_USER)}:${enc(process.env.DB_PASSWORD)}@${process.env.DB_HOST}:${process.env.DB_PORT}/${process.env.DB_NAME}?schema=public&sslmode=${sslmode}`; execSync("packages/db/node_modules/.bin/prisma migrate deploy --schema packages/db/prisma/schema.prisma", { stdio: "inherit", env: { ...process.env, DATABASE_URL: databaseUrl } });'
          overrides_json="$(jq -n --arg cmd "$migration_cmd" '{
            containerOverrides: [
              {
                name: "api",
                command: ["node", "-e", $cmd]
              }
            ]
          }')"

          run_output="$(aws ecs run-task \
            --cluster "$cluster_name" \
            --launch-type FARGATE \
            --task-definition "$task_def" \
            --count 1 \
            --network-configuration "awsvpcConfiguration={subnets=[$subnet_csv],securityGroups=[$sg_csv],assignPublicIp=DISABLED}" \
            --overrides "$overrides_json" \
            --output json)"

          run_arn="$(echo "$run_output" | jq -r '.tasks[0].taskArn // empty')"
          failure_count="$(echo "$run_output" | jq '.failures | length')"
          if [[ "$failure_count" -gt 0 || -z "$run_arn" ]]; then
            echo "Failed to start migration task."
            echo "$run_output" | jq -r '.failures[]? | "- \(.arn // "unknown"): \(.reason // "unknown reason") \(.detail // "")"'
            exit 1
          fi

          echo "Migration task started: $run_arn"
          aws ecs wait tasks-stopped --cluster "$cluster_name" --tasks "$run_arn"

          exit_code="$(aws ecs describe-tasks \
            --cluster "$cluster_name" \
            --tasks "$run_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"

          if [[ "$exit_code" != "0" ]]; then
            echo "Migration task failed with exit code: $exit_code"
            aws logs tail /ecs/demo-api --since 15m || true
            exit 1
          fi

          echo "Prisma migrations applied successfully."

      - name: Deploy summary
        run: |
          echo "Environment: ${{ steps.meta.outputs.deploy_env }}"
          echo "Deployed image tag: ${{ steps.meta.outputs.image_tag }}"
          echo "ECR registry: ${{ steps.meta.outputs.registry }}"
